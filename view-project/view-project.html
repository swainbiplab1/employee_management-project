<div class="page-header">
  <button class="back-btn" (click)="goToDashboard()">
    ← Back
  </button>
</div>
<div class="project-wrapper">

  <div class="project-card">

    <h2 class="title">Project List</h2>

    <table class="project-table">

      <thead>
        <tr>
          <th>Name</th>
          <th>Start Date</th>
          <th>End Date</th>
          <th>Created By</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngIf="projects.length === 0">
          <td colspan="5" class="no-data">
            No Projects Found
          </td>
        </tr>

        <tr *ngFor="let p of projects">
          <td>{{ p.projectName }}</td>
          <td>{{ p.startDate }}</td>
          <td>{{ p.endDate }}</td>
          <td>{{ p.createdBy }}</td>
          <td>
            <button class="update-btn" (click)="openUpdateModal(p)">
              Update
            </button>
            <button class="delete-btn" (click)="deleteProject(p.projectId)">
              Delete
            </button>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>







<div class="modal-overlay" *ngIf="showModal">

  <div class="modal-content">

    <h3>Update Project</h3>

    <form #projectForm="ngForm">

      <div class="form-group">

        <div class="label-row">
          <label>Project Name</label>

          <span
            class="error"
            *ngIf="projectName.invalid && projectName.touched">

            <span *ngIf="projectName.errors?.['required']">
              Required
            </span>

            <span *ngIf="projectName.errors?.['minlength']">
              Min 3 chars
            </span>

            <span *ngIf="projectName.errors?.['pattern']">
              Invalid Name
            </span>

          </span>
        </div>

        <input
          type="text"
          name="projectName"
          #projectName="ngModel"
          [(ngModel)]="selectedProject.projectName"
          required
          minlength="3"
          pattern="^[a-zA-Z0-9 _-]+$">

      </div>

      <div class="form-group">

        <div class="label-row">
          <label>Start Date</label>

          <span
            class="error"
            *ngIf="startDate.invalid && startDate.touched">

            Required

          </span>
        </div>

        <input
          type="date"
          name="startDate"
          #startDate="ngModel"
          [(ngModel)]="selectedProject.startDate"
          required>

      </div>

      <div class="form-group">

        <div class="label-row">
          <label>End Date</label>

          <span
            class="error"
            *ngIf="selectedProject.endDate &&
                   selectedProject.endDate < selectedProject.startDate">

            End date must be after start date

          </span>
        </div>

        <input
          type="date"
          name="endDate"
          #endDate="ngModel"
          [(ngModel)]="selectedProject.endDate"
          required>

      </div>

      <div class="modal-buttons">

        <button
          type="button"
          class="save-btn"
          [disabled]="projectForm.invalid ||
                      (selectedProject.endDate &&
                       selectedProject.endDate < selectedProject.startDate)"
          (click)="updateProject()">

          Save

        </button>

        <button
          type="button"
          class="cancel-btn"
          (click)="closeModal()">

          Cancel

        </button>

      </div>

    </form>

  </div>

</div>
