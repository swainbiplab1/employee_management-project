<div class="page-header">
  <button class="back-btn" (click)="goToDashboard()">
    ← Back
  </button>
</div>
<div class="employee-wrapper">

  <div class="employee-card">

    <h2 class="title">Employee List</h2>

    <table class="employee-table">

      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Department</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngIf="employees.length === 0">
          <td colspan="5" class="no-data">
            No Employee Found
          </td>
        </tr>
        <tr *ngFor="let emp of employees">
          <td>{{ emp.name || emp.name?.name}}</td>
          <td>{{ emp.email || emp.email?.email}}</td>
          <td>{{ emp.departmentName || emp.department?.departmentName }}</td>
          <td>
            <button class="update-btn" (click)="openUpdateModal(emp)">
              Update
            </button>
            <button class="delete-btn" (click)="deleteEmployee(emp.employeeId)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>

    </table>

  </div>

</div>








<div class="modal-overlay" *ngIf="showModal">

  <div class="modal-content">

    <h3>Update Employee</h3>

    <form #updateForm="ngForm">

      <div class="form-group">

        <div class="label-row">
          <label>Name</label>

          <span class="error" *ngIf="name.invalid && name.touched">

            <span *ngIf="name.errors?.['required']">
              Required
            </span>

            <span *ngIf="name.errors?.['minlength']">
              Min 3 chars
            </span>

          </span>
        </div>

        <input type="text" name="name" #name="ngModel" [(ngModel)]="selectedEmployee.name" required minlength="3">
      </div>

      <div class="form-group">

        <div class="label-row">
          <label>Email</label>

          <span class="error" *ngIf="email.invalid && email.touched">

            <span *ngIf="email.errors?.['required']">
              Required
            </span>

            <span *ngIf="email.errors?.['email']">
              Invalid Email
            </span>

          </span>
        </div>

        <input type="email" name="email" #email="ngModel" [(ngModel)]="selectedEmployee.email" required email>
      </div>

      <div class="form-group">

        <div class="label-row">
          <label>Department</label>

          <span class="error" *ngIf="departmentId.invalid && departmentId.touched">

            Required

          </span>
        </div>

        <select name="departmentId" #departmentId="ngModel" [(ngModel)]="selectedEmployee.departmentId" required>

          <option [ngValue]="null">
            Select Department
          </option>

          <option *ngFor="let dept of departments" [ngValue]="dept.departmentId">

            {{ dept.departmentName }}

          </option>

        </select>

      </div>

      <div class="modal-buttons">

        <button class="save-btn" type="button" [disabled]="updateForm.invalid" (click)="updateEmployee()">

          Save

        </button>

        <button type="button" class="cancel-btn" (click)="closeModal()">

          Cancel

        </button>

      </div>

    </form>

  </div>

</div>
