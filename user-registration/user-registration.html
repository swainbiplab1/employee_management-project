<div class="registration-container">

  <div class="registration-card">

    <div class="header">
      <h2>Create Account</h2>
      <p>Register to access the Employee Management System</p>
    </div>

    <form #regForm="ngForm" (ngSubmit)="register(regForm)">

      <div class="form-group">
        <label for="username">Username</label>

        <input type="text" id="username" name="username" #username="ngModel" [(ngModel)]="user.username"
          placeholder="Enter username" required minlength="3">

        <small class="error" *ngIf="username.invalid && username.touched">
          Username must be at least 3 characters.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>

        <input type="password" id="password" name="password" #password="ngModel" [(ngModel)]="user.password"
          placeholder="Enter password" required minlength="6">

        <small class="error" *ngIf="password.invalid && password.touched">
          Password must be at least 6 characters.
        </small>
      </div>

      <div class="form-group">
        <label for="role">Role</label>

        <select id="role" name="role" #role="ngModel" [(ngModel)]="user.role" required>

          <option value="" disabled>Select Role</option>
          <option value="MANAGER">MANAGER</option>
          <option value="EMPLOYEE">EMPLOYEE</option>

        </select>

        <small class="error" *ngIf="role.invalid && role.touched">
          Please select a role.
        </small>
      </div>

      <div class="button-group">

        <button type="submit" class="register-btn" [disabled]="regForm.invalid">
          Register
        </button>

        <button type="button" class="login-btn" (click)="goToLogin()">
          Login
        </button>

      </div>

    </form>

  </div>

</div>
