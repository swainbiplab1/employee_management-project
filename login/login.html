<div class="login-container">

  <div class="login-card">

    <div class="header">
      <h2>Welcome Back</h2>
      <p>Sign in to continue to Employee Management System</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login()">

      <div class="form-group">
        <label for="username">Username</label>

        <input type="text" id="username" name="username" #username="ngModel" [(ngModel)]="loginRequest.username"
          placeholder="Enter Username" required minlength="3">

        <small class="error" *ngIf="username.invalid && username.touched">
          Username is required.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>

        <input type="password" id="password" name="password" #password="ngModel" [(ngModel)]="loginRequest.password"
          placeholder="Enter Password" required minlength="6">

        <small class="error" *ngIf="password.invalid && password.touched">
          Password must be at least 6 characters.
        </small>
      </div>

      <div class="button-group">

        <button type="submit" class="login-btn" [disabled]="loginForm.invalid">
          Login
        </button>

        <button type="button" class="register-btn" (click)="goToRegister()">
          Register
        </button>

      </div>

    </form>

  </div>

</div>
